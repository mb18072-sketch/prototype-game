<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <link href="https://www.gstatic.com/images/branding/searchlogo/ico/favicon.ico" rel="icon">

    <style>
        @font-face {
            font-family: 'MyCustomFont'; /* 👈 ゲーム内で使うフォントの好きな名前 */
            src: url('assets/JF-Dot-K14-2004.ttf') format('truetype'); /* 👈 フォントファイルのパス */
        }

        /* 💡 バグ防止用：ブラウザに最初からフォントを認識させておくための隠しテキスト */
        .font-preload {
            font-family: 'MyCustomFont';
            position: absolute;
            opacity: 0;
        }
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>
    <div id="game-wrapper">
        <div id="game"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
